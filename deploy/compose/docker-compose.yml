services:
  api:
    image: oven/bun:1.2.23
    working_dir: /workspace
    command: sh -lc "bun install --frozen-lockfile && cd apps/api && bun run start"
    environment:
      AUTH_MODE: test
      INTERNAL_SERVICE_TOKEN: compose-internal-service-token
      API_PORT: "3000"
      API_PUBLIC_URL: http://localhost:3000
      API_INTERNAL_URL: http://api:3000
      BRIDGE_CALLBACK_BASE_URL: http://api:3000
      AGENT_POOL_WEB_SANDBOX_DB_PATH: /data/web-sandbox.db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_MANAGEMENT_URL: http://guest:guest@rabbitmq:15672
      RABBITMQ_PROJECT_TASK_QUEUE_PREFIX: project-tasks
      RABBITMQ_PROJECT_CONTROL_QUEUE_PREFIX: project-control
      STORAGE_ADAPTER: blob
      STORAGE_BUCKET: agent-pool-local
      STORAGE_LOCAL_ROOT: /data/storage
      COMPOSE_SMOKE_ENABLED: "true"
      COMPOSE_SMOKE_PROJECT_ID: compose-smoke
    ports:
      - "3000:3000"
    volumes:
      - ../..:/workspace
      - api-data:/data
      - bun-cache:/root/.bun
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  orchestrator:
    image: oven/bun:1.2.23
    working_dir: /workspace
    command: sh -lc "bun install --frozen-lockfile && cd apps/orchestrator && bun run start"
    environment:
      AUTH_MODE: test
      INTERNAL_SERVICE_TOKEN: compose-internal-service-token
      ORCHESTRATOR_PORT: "3001"
      ORCHESTRATOR_PUBLIC_URL: http://localhost:3001
      ORCHESTRATOR_BACKEND_INTERNAL_URL: http://api:3000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_MANAGEMENT_URL: http://guest:guest@rabbitmq:15672
      RABBITMQ_PROJECT_TASK_QUEUE_PREFIX: project-tasks
      RABBITMQ_PROJECT_CONTROL_QUEUE_PREFIX: project-control
      STORAGE_ADAPTER: blob
      STORAGE_BUCKET: agent-pool-local
      STORAGE_LOCAL_ROOT: /workspace/.agent-pool/web-sandbox/storage
      RUNTIME_PROVIDER: fake
      COMPOSE_SMOKE_ENABLED: "true"
      COMPOSE_SMOKE_PROJECT_ID: compose-smoke
      CONTROL_PLANE_WORKER_POLL_INTERVAL_MS: "1000"
      CONTROL_PLANE_RECONCILE_INTERVAL_MS: "5000"
    ports:
      - "3001:3001"
    volumes:
      - ../..:/workspace
      - bun-cache:/root/.bun
    depends_on:
      api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  api-data:
  bun-cache:
  minio-data:
