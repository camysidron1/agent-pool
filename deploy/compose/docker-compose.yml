services:
  api:
    image: oven/bun:1.2.23
    working_dir: /workspace
    command: sh -lc "bun install --frozen-lockfile && cd apps/api && bun run start"
    environment:
      AUTH_MODE: test
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-compose-internal-service-token}
      API_PORT: "3000"
      API_PUBLIC_URL: http://localhost:3000
      API_INTERNAL_URL: http://api:3000
      BRIDGE_CALLBACK_BASE_URL: ${BRIDGE_CALLBACK_BASE_URL:-http://api:3000}
      AGENT_POOL_WEB_SANDBOX_DB_PATH: /data/web-sandbox.db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_MANAGEMENT_URL: http://guest:guest@rabbitmq:15672
      RABBITMQ_PROJECT_TASK_QUEUE_PREFIX: project-tasks
      RABBITMQ_PROJECT_CONTROL_QUEUE_PREFIX: project-control
      STORAGE_ADAPTER: blob
      STORAGE_BUCKET: agent-pool-local
      STORAGE_LOCAL_ROOT: /data/storage
      COMPOSE_SMOKE_ENABLED: "true"
      COMPOSE_SMOKE_PROJECT_ID: compose-smoke
      AGENT_POOL_SMOKE_FIXTURE_REPOSITORIES: ${AGENT_POOL_SMOKE_FIXTURE_REPOSITORIES:-}
      RUNTIME_PROVIDER: ${RUNTIME_PROVIDER:-fake}
      AGENT_RUNNER_MODE: ${AGENT_RUNNER_MODE:-bridge-smoke}
      E2B_API_KEY_ENV_NAME: ${E2B_API_KEY_ENV_NAME:-E2B_API_KEY}
      E2B_API_KEY: ${E2B_API_KEY:-}
      E2B_TEMPLATE_ID: ${E2B_TEMPLATE_ID:-}
      E2B_SANDBOX_IMAGE_ID: ${E2B_SANDBOX_IMAGE_ID:-}
      E2B_GITHUB_TOKEN_ENV_NAME: ${E2B_GITHUB_TOKEN_ENV_NAME:-GITHUB_TOKEN}
      E2B_ALLOWED_SECRET_ENV_NAMES: ${E2B_ALLOWED_SECRET_ENV_NAMES:-GITHUB_TOKEN,CODEX_API_KEY}
      CODEX_API_KEY_ENV_NAME: ${CODEX_API_KEY_ENV_NAME:-CODEX_API_KEY}
      CODEX_API_KEY: ${CODEX_API_KEY:-}
      CODEX_COMMAND_PROFILE: ${CODEX_COMMAND_PROFILE:-agent-pool-bun-pr}
      EGRESS_PROXY_URL: ${EGRESS_PROXY_URL:-}
      EGRESS_PROXY_ALLOW_OUT: ${EGRESS_PROXY_ALLOW_OUT:-}
      EGRESS_PACKAGE_PROXY_URL: ${EGRESS_PACKAGE_PROXY_URL:-}
      E2B_LOCAL_ALLOW_DIRECT_EGRESS: ${E2B_LOCAL_ALLOW_DIRECT_EGRESS:-false}
      AGENT_POOL_ALLOWED_EGRESS_DOMAINS: ${AGENT_POOL_ALLOWED_EGRESS_DOMAINS:-github.com,api.github.com,registry.npmjs.org,api.openai.com}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
      GITHUB_APP_TOKEN_ENV_NAME: ${GITHUB_APP_TOKEN_ENV_NAME:-GITHUB_TOKEN}
      EGRESS_GATEWAY_BACKEND_INTERNAL_URL: http://api:3000
    ports:
      - "3000:3000"
    volumes:
      - ../..:/workspace
      - api-data:/data
      - bun-cache:/root/.bun
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  orchestrator:
    image: oven/bun:1.2.23
    working_dir: /workspace
    command: sh -lc "bun install --frozen-lockfile && cd apps/orchestrator && bun run start"
    environment:
      AUTH_MODE: test
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-compose-internal-service-token}
      ORCHESTRATOR_PORT: "3001"
      ORCHESTRATOR_PUBLIC_URL: http://localhost:3001
      ORCHESTRATOR_BACKEND_INTERNAL_URL: http://api:3000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_MANAGEMENT_URL: http://guest:guest@rabbitmq:15672
      RABBITMQ_PROJECT_TASK_QUEUE_PREFIX: project-tasks
      RABBITMQ_PROJECT_CONTROL_QUEUE_PREFIX: project-control
      STORAGE_ADAPTER: blob
      STORAGE_BUCKET: agent-pool-local
      STORAGE_LOCAL_ROOT: /workspace/.agent-pool/web-sandbox/storage
      RUNTIME_PROVIDER: ${RUNTIME_PROVIDER:-fake}
      COMPOSE_SMOKE_ENABLED: "true"
      COMPOSE_SMOKE_PROJECT_ID: compose-smoke
      CONTROL_PLANE_WORKER_POLL_INTERVAL_MS: "1000"
      CONTROL_PLANE_RECONCILE_INTERVAL_MS: "5000"
      E2B_API_KEY_ENV_NAME: ${E2B_API_KEY_ENV_NAME:-E2B_API_KEY}
      E2B_API_KEY: ${E2B_API_KEY:-}
      E2B_TEMPLATE_ID: ${E2B_TEMPLATE_ID:-}
      E2B_SANDBOX_IMAGE_ID: ${E2B_SANDBOX_IMAGE_ID:-}
      E2B_GITHUB_TOKEN_ENV_NAME: ${E2B_GITHUB_TOKEN_ENV_NAME:-GITHUB_TOKEN}
      E2B_ALLOWED_SECRET_ENV_NAMES: ${E2B_ALLOWED_SECRET_ENV_NAMES:-GITHUB_TOKEN,CODEX_API_KEY}
      E2B_WORKING_DIRECTORY: ${E2B_WORKING_DIRECTORY:-/workspace/agent-pool}
      E2B_STARTUP_TIMEOUT_MS: ${E2B_STARTUP_TIMEOUT_MS:-120000}
      E2B_CLEANUP_TIMEOUT_MS: ${E2B_CLEANUP_TIMEOUT_MS:-30000}
      AGENT_RUNNER_MODE: ${AGENT_RUNNER_MODE:-bridge-smoke}
      CODEX_COMMAND: ${CODEX_COMMAND:-codex}
      CODEX_API_KEY_ENV_NAME: ${CODEX_API_KEY_ENV_NAME:-CODEX_API_KEY}
      CODEX_API_KEY: ${CODEX_API_KEY:-}
      CODEX_MODEL: ${CODEX_MODEL:-}
      CODEX_COMMAND_PROFILE: ${CODEX_COMMAND_PROFILE:-agent-pool-bun-pr}
      EGRESS_PROXY_URL: ${EGRESS_PROXY_URL:-}
      EGRESS_PROXY_ALLOW_OUT: ${EGRESS_PROXY_ALLOW_OUT:-}
      EGRESS_PROXY_NO_PROXY: ${EGRESS_PROXY_NO_PROXY:-}
      EGRESS_PACKAGE_PROXY_URL: ${EGRESS_PACKAGE_PROXY_URL:-}
      E2B_LOCAL_ALLOW_DIRECT_EGRESS: ${E2B_LOCAL_ALLOW_DIRECT_EGRESS:-false}
      AGENT_POOL_ALLOWED_EGRESS_DOMAINS: ${AGENT_POOL_ALLOWED_EGRESS_DOMAINS:-github.com,api.github.com,registry.npmjs.org,api.openai.com}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      EGRESS_GATEWAY_BACKEND_INTERNAL_URL: http://api:3000
    ports:
      - "3001:3001"
    volumes:
      - ../..:/workspace
      - bun-cache:/root/.bun
    depends_on:
      api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    image: oven/bun:1.2.23
    working_dir: /workspace
    command: sh -lc "bun install --frozen-lockfile && cd apps/web && bun run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ../..:/workspace
      - bun-cache:/root/.bun
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:5173/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  caddy:
    image: caddy:2.8.4-alpine
    ports:
      - "${AGENT_POOL_COMPOSE_EDGE_PORT:-3080}:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12

  egress-gateway:
    image: oven/bun:1.2.23
    working_dir: /workspace
    command: sh -lc "bun install --frozen-lockfile && cd apps/egress-gateway && bun run start"
    environment:
      AUTH_MODE: test
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-compose-internal-service-token}
      EGRESS_GATEWAY_PORT: "3002"
      EGRESS_GATEWAY_BACKEND_INTERNAL_URL: http://api:3000
      EGRESS_GATEWAY_DEFAULT_DENY: "true"
    ports:
      - "3002:3002"
    volumes:
      - ../..:/workspace
      - bun-cache:/root/.bun
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  api-data:
  bun-cache:
  minio-data:
