name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for tests
        run: |
          git config --global user.email "ci@test.com"
          git config --global user.name "CI"

      - name: Run test suite
        run: bash tests/run-all.sh
